<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Dashboard - Garcia Builder</title>
    <script src="js/env.js?v=20251028"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/core/supabase.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .loading-container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(246, 200, 78, 0.2);
            border-top-color: #f6c84e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f6c84e;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }
        .error-message {
            color: #ff6b6b;
            margin-top: 1rem;
        }
        .action-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: #f6c84e;
            color: #0f0f0f;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="Logo Files/For Web/logo-nobackground-500.png" alt="Garcia Builder" class="logo">
        <div class="spinner"></div>
        <h1 id="status-title">Processing authentication...</h1>
        <p id="status-message">Please wait while we verify your credentials.</p>
        <div id="error-container" class="hidden">
            <p class="error-message" id="error-message"></p>
            <a href="pages/auth/login.html" class="action-btn" id="login-link">Back to Login</a>
        </div>
    </div>

    <script>
        (async function() {
            // If this dashboard is reached on a non-local host but contains a devReturn param,
            // bounce back to the local environment carrying over the OAuth hash tokens.
            try {
                const sp = new URLSearchParams(window.location.search);
                const devReturn = sp.get('devReturn');
                if (devReturn) {
                    const targetBase = devReturn.replace(/\/?$/, '/');
                    const target = new URL('dashboard.html', targetBase);
                    target.hash = window.location.hash || '';
                    const isSameOrigin = target.origin === window.location.origin;
                    if (!isSameOrigin) {
                        console.log('↩️ Redirecting back to local dev from hosted environment...', { target: target.toString() });
                        window.location.replace(target.toString());
                        return; // Stop further processing on this host
                    }
                }
            } catch (e) {
                console.warn('devReturn redirect check failed:', e);
            }

            const statusTitle = document.getElementById('status-title');
            const statusMessage = document.getElementById('status-message');
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            const loginLink = document.getElementById('login-link');
            const messages = {
                en: {
                    processingTitle: 'Processing authentication...',
                    processingMessage: 'Please wait while we verify your credentials.',
                    verifiedTitle: 'Login verified!',
                    redirecting: 'Redirecting to your dashboard...',
                    validatingSocial: 'Validating social login...',
                    authError: 'Authentication error',
                    unknownError: 'Unknown error',
                    backToLogin: 'Back to Login',
                    supabaseUnavailable: 'Supabase client did not initialize. Check env-config.json.',
                    oauthCodeFailed: 'Failed to validate OAuth code',
                    unauthenticated: 'User is not authenticated'
                },
                pt: {
                    processingTitle: 'Processando autenticacao...',
                    processingMessage: 'Aguarde enquanto verificamos suas credenciais.',
                    verifiedTitle: 'Login verificado!',
                    redirecting: 'Redirecionando para seu painel...',
                    validatingSocial: 'Validando login social...',
                    authError: 'Erro na autenticacao',
                    unknownError: 'Erro desconhecido',
                    backToLogin: 'Voltar para Login',
                    supabaseUnavailable: 'O cliente Supabase nao inicializou. Verifique env-config.json.',
                    oauthCodeFailed: 'Falha ao validar o codigo OAuth',
                    unauthenticated: 'Usuario nao autenticado'
                },
                es: {
                    processingTitle: 'Procesando autenticacion...',
                    processingMessage: 'Espera mientras verificamos tus credenciales.',
                    verifiedTitle: 'Login verificado!',
                    redirecting: 'Redirigiendo a tu panel...',
                    validatingSocial: 'Validando login social...',
                    authError: 'Error de autenticacion',
                    unknownError: 'Error desconocido',
                    backToLogin: 'Volver al Login',
                    supabaseUnavailable: 'El cliente Supabase no se inicializo. Revisa env-config.json.',
                    oauthCodeFailed: 'No se pudo validar el codigo OAuth',
                    unauthenticated: 'Usuario no autenticado'
                }
            };
            const currentLang = (() => {
                const raw = localStorage.getItem('gb_lang') || localStorage.getItem('gb_language') || navigator.language || 'en';
                const lang = String(raw).toLowerCase();
                if (lang.startsWith('pt')) return 'pt';
                if (lang.startsWith('es')) return 'es';
                return 'en';
            })();
            const t = (key) => messages[currentLang]?.[key] || messages.en[key] || key;
            statusTitle.textContent = t('processingTitle');
            statusMessage.textContent = t('processingMessage');
            if (loginLink) loginLink.textContent = t('backToLogin');

            const getLocalUser = () => {
                try {
                    const raw = localStorage.getItem('gb_current_user');
                    return raw ? JSON.parse(raw) : null;
                } catch (parseErr) {
                    console.warn('Local session parse failed:', parseErr);
                    return null;
                }
            };

            const trackLogin = (user, provider) => {
                if (!user) return;
                try {
                    window.dataLayer = window.dataLayer || [];
                    window.dataLayer.push({
                        event: 'user_login',
                        method: provider,
                        auth_provider: provider,
                        user_email_domain: (user.email || '').split('@')[1] || ''
                    });
                } catch (trackErr) {
                    console.warn('⚠️ Tracking falhou:', trackErr);
                }
            };

            const redirectToApp = async (user, provider) => {
                if (user) {
                    localStorage.setItem('gb_current_user', JSON.stringify(user));
                }
                trackLogin(user, provider);
                statusTitle.textContent = t('verifiedTitle');
                statusMessage.textContent = t('redirecting');
                await new Promise(resolve => setTimeout(resolve, 800));
                window.location.href = 'pages/public/dashboard.html';
            };

            try {
                console.log('🔐 OAuth redirect handler - Verificando autenticação...');

                // Aguardar Supabase client estar disponível
                let attempts = 0;
                while (!window.supabaseClient && attempts < 20) {
                    await new Promise(resolve => setTimeout(resolve, 250));
                    attempts++;
                }

                if (!window.supabaseClient) {
                    const localUser = getLocalUser();
                    if (localUser) {
                        console.log('Supabase indisponível, utilizando sessão local.');
                        await redirectToApp(localUser, localUser.is_local_admin ? 'local_admin' : 'local');
                        return;
                    }
                    throw new Error(t('supabaseUnavailable'));
                }

                console.log('✅ Supabase client disponível');

                // Verificar se há tokens OAuth na URL (hash ou query params)
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const queryParams = new URLSearchParams(window.location.search);

                console.log('📦 Query recebida:', window.location.search || '(sem query)');
                console.log('📦 Hash recebido:', window.location.hash || '(sem hash)');

                const hasOAuthTokens = hashParams.has('access_token') ||
                                     queryParams.has('code') ||
                                     hashParams.has('error');

                console.log('🔍 OAuth URL debug', {
                    hasOAuthTokens,
                    queryKeys: Array.from(queryParams.keys()),
                    hashKeys: Array.from(hashParams.keys()),
                    hasCodeParam: queryParams.has('code'),
                    hasAccessToken: hashParams.has('access_token'),
                    hasRefreshToken: hashParams.has('refresh_token'),
                    devReturn: queryParams.get('devReturn') || null
                });

                if (hasOAuthTokens) {
                    console.log('🔑 Tokens OAuth detectados na URL');
                    statusMessage.textContent = t('validatingSocial');
                }

                const code = queryParams.get('code');
                const state = queryParams.get('state');
                console.log('🔍 Parâmetros relevantes', {
                    codeLength: code ? code.length : 0,
                    stateLength: state ? state.length : 0,
                    devReturn: queryParams.get('devReturn') || null
                });
                if (code) {
                    console.log('🔄 Trocando código OAuth por sessão...');
                    const { error: exchangeError } = await window.supabaseClient.auth.exchangeCodeForSession({ code });
                    if (exchangeError) {
                        throw new Error(exchangeError.message || t('oauthCodeFailed'));
                    }

                    console.log('✅ Código OAuth trocado com sucesso');

                    try {
                        const exchangeSession = await window.supabaseClient.auth.getSession();
                        const sessionObj = exchangeSession?.data?.session || null;
                        console.log('🧾 Sessão após troca de código', {
                            hasSession: !!sessionObj,
                            provider: sessionObj?.user?.app_metadata?.provider || sessionObj?.provider_token ? 'provider' : null,
                            expiresAt: sessionObj?.expires_at || null
                        });
                    } catch (sessionErr) {
                        console.warn('⚠️ Falha ao obter sessão após troca de código:', sessionErr);
                    }

                    // Limpar parâmetros sensíveis para evitar reprocessamento em reloads
                    try {
                        const cleanedUrl = new URL(window.location.href);
                        cleanedUrl.searchParams.delete('code');
                        cleanedUrl.searchParams.delete('state');
                        window.history.replaceState({}, document.title, cleanedUrl.toString());
                    } catch (urlErr) {
                        console.warn('Não foi possível limpar parâmetros OAuth da URL:', urlErr);
                    }
                }

                // Aguardar um pouco para o Supabase processar os tokens
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Verificar usuário autenticado
                try {
                    const sessionCheck = await window.supabaseClient.auth.getSession();
                    const currentSession = sessionCheck?.data?.session || null;
                    console.log('🧭 Sessão ativa antes do getUser', {
                        hasSession: !!currentSession,
                        accessTokenSnippet: currentSession?.access_token ? `${currentSession.access_token.slice(0, 8)}…` : null,
                        expiresAt: currentSession?.expires_at || null,
                        provider: currentSession?.user?.app_metadata?.provider || null
                    });
                } catch (sessionCheckErr) {
                    console.warn('⚠️ Falha ao checar sessão ativa:', sessionCheckErr);
                }

                const { data, error } = await window.supabaseClient.auth.getUser();
                const user = data?.user || null;

                console.log('🔍 Supabase getUser resultado', {
                    hasUser: !!user,
                    userEmail: user?.email || null,
                    errorMessage: error?.message || null
                });

                if (error || !user) {
                    console.error('❌ Erro ao verificar usuário:', error);
                    const localUser = getLocalUser();
                    if (localUser) {
                        console.log('Sessão local encontrada, prosseguindo sem Supabase.');
                        await redirectToApp(localUser, localUser.is_local_admin ? 'local_admin' : 'local');
                        return;
                    }
                    throw new Error(error?.message || t('unauthenticated'));
                }

                console.log('✅ Usuário autenticado:', user.email);

                // Salvar usuário no localStorage para compatibilidade com scripts antigos
                const normalizedUser = {
                    id: user.id,
                    name: user.user_metadata?.full_name || user.email,
                    full_name: user.user_metadata?.full_name || '',
                    email: user.email,
                    registeredAt: user.created_at || new Date().toISOString(),
                    lastLogin: new Date().toISOString()
                };
                localStorage.setItem('gb_current_user', JSON.stringify(normalizedUser));

                // Upsert profile no banco
                try {
                    await window.supabaseClient
                        .from('user_profiles')
                        .upsert({
                            user_id: user.id,
                            email: user.email,
                            full_name: user.user_metadata?.full_name || '',
                            joined_date: user.created_at || new Date().toISOString(),
                            last_login: new Date().toISOString()
                        });
                    console.log('✅ Profile sincronizado');
                } catch (e) {
                    console.warn('⚠️ Profile upsert falhou (não crítico):', e?.message || e);
                }

                // Tracking de login
                const provider = user.app_metadata?.provider || 'oauth';
                await redirectToApp(normalizedUser, provider);

            } catch (error) {
                console.error('❌ Erro no OAuth handler:', error);
                const localUser = getLocalUser();
                if (localUser) {
                    console.log('Erro Supabase, mas sessão local presente. Redirecionando...');
                    await redirectToApp(localUser, localUser.is_local_admin ? 'local_admin' : 'local');
                    return;
                }
                statusTitle.textContent = t('authError');
                statusMessage.classList.add('hidden');
                errorMessage.textContent = error.message || t('unknownError');
                errorContainer.classList.remove('hidden');

                // Se não conseguiu autenticar, limpar localStorage
                localStorage.removeItem('gb_current_user');
            }
        })();
    </script>
</body>
</html>
